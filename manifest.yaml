# 通天河 编译清单：钉上游版本 + 类别定义。
#
# 上游已钉到 commit SHA（2026-06-10 初次钉定）。bump：把对应 commit 换成新的 SHA/tag；
# rollback：换回旧 SHA。占位符 / 滚动分支(master/main/...) 会被 Manifest.Validate() fail-fast 挡住。
#
# repo / base_url 是自有产物仓库 + jsdelivr 基址（cutover 时订阅模板引用）。
# 解析器与上游的对应见 README「选定的源头」。

repo: "river2heaven/tongtian"
# cutover 时把 <TAG> 换成具体 ruleset-YYYYMMDD-HHMM tag（可回退）；或用 @ruleset-dist 取滚动最新
base_url: "https://cdn.jsdelivr.net/gh/river2heaven/tongtian@<TAG>/dist"

upstreams:
  # —— Tier 1 骨架 ——
  domain-list-community:
    repo: v2fly/domain-list-community
    commit: "76199d8e61d348c58433e3c36d9d4f85131d80e7"
    data_dir: data                       # 设了 data_dir = geosite 上游
  dnsmasq-china-list:
    repo: felixonmars/dnsmasq-china-list
    commit: "d87a5bc1d76b87a6729e9e5355c35be0fc2ff6cd"
    files: [accelerated-domains.china.conf]
  gfwlist:                               # GFW 一手源头（base64 AutoProxy）
    repo: gfwlist/gfwlist
    commit: "e8e285a9b1597f47ff2f6f4d556f11eb0a810d30"
    files: [gfwlist.txt]
  chnroutes2:                            # GEOIP-CN 一手源（IP-CIDR）
    repo: misakaio/chnroutes2
    commit: "581f1f60b073aa53abfe3a5da45419a67b4a6708"
    files: [chnroutes.txt]

  # —— Tier 2 富化：广告 reject ——
  anti-ad:                               # CN 广告 reject 权威（纯域名）
    repo: privacy-protection-tools/anti-AD
    commit: "a8f65d8043940b20ba7ee75d402c60b885e547e6"
    files: [anti-ad-domains.txt]
  hagezi-pro:                            # 分级最细（onlydomains 纯域名）
    repo: hagezi/dns-blocklists
    commit: "78cf5b378eb35137026142165337373bd7c3d4c3"
    files: [wildcard/pro-onlydomains.txt]

  # —— Tier 2 富化：AI 长尾 cross-check ——
  # 注：VPSDance/ai-proxy-rules 是 per-provider YAML 源（无现成域名清单），不适配本编译器的
  # domainlist 解析器，暂不纳入；待其有合并产物或加 YAML 解析器再补。
  ai-fmz200:                             # 含 Anthropic/OpenAI 等长尾（DOMAIN/-SUFFIX/IP-CIDR）
    repo: fmz200/wool_scripts
    commit: "9c74d2bc3cea5c869f7a6c1b06571d285b4a3f78"
    files: [Loon/rule/AI.list]

# 类别 → 产物（每项产 <name>.list + <name>.singbox.json[+ .srs]）。
# 一个类别可引用多个输入源，编译器取并集 + 去重。
categories:
  # —— 冻结四类（geosite）——
  - name: netflix
    geosite: [netflix]
    exclude_attrs: [ads]
  - name: youtube
    geosite: [youtube]
    exclude_attrs: [ads]
  - name: github
    geosite: [github]
  - name: cloudflare
    geosite: [cloudflare]

  # —— CN 域名 + GEOIP-CN + GFW（新血统）——
  - name: cn
    chinalist: dnsmasq-china-list
  - name: geoip-cn
    geoip: chnroutes2
  - name: gfw
    gfwlist: gfwlist

  # —— AI：dlc category-ai-!cn（dlc 官方"全部非中国 AI"聚合，include 展开 20+ 厂商：
  #    anthropic/openai/perplexity/xai(grok)/github-copilot/cursor/windsurf/poe/groq/
  #    huggingface/cohere/cerebras/elevenlabs/deepmind...）+ gemini 补全 + fmz200 长尾，合并去重。
  # category-ai-!cn 的 include 不含 gemini，故单列 google-gemini；bard 已被上游删（Bard→Gemini）。
  - name: ai
    geosite: ["category-ai-!cn", google-gemini]
    exclude_attrs: [ads]
    domainlists: [ai-fmz200]

  # —— 广告 reject：anti-AD + hagezi 合并去重 ——
  - name: reject
    domainlists: [anti-ad, hagezi-pro]

  # —— 流媒体 / 社交（geosite）——
  - name: disney
    geosite: [disney]
  - name: telegram
    geosite: [telegram]
  - name: twitter
    geosite: [twitter]
